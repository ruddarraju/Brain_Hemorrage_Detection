<!DOCTYPE html>
<html>
<head>
<title>Brain AI Online</title>
<style>
body {
    margin:0;
    font-family:Segoe UI;
    background:#0f172a;
    color:white;
}
.container {
    width:70%;
    margin:auto;
    margin-top:30px;
}
.chat-box {
    background:#1e293b;
    height:520px;
    overflow-y:auto;
    padding:20px;
    border-radius:10px;
}
.message { margin-bottom:15px; white-space:pre-line; }
.user { color:#38bdf8; }
.bot { color:#86efac; }
.input-area {
    margin-top:15px;
    display:flex;
    gap:10px;
}
input, button {
    padding:10px;
    border-radius:6px;
    border:none;
}
button {
    background:#22c55e;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
<h2>🧠 AI Brain Hemorrhage Assistant (Online)</h2>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">
<input type="text" id="message" placeholder="Type message..." />
<input type="file" id="imageInput" />
<button onclick="send()">Send</button>
<button onclick="downloadReport()">Download Report</button>
</div>
</div>

<script>
function send(){
 let box=document.getElementById("chatBox");
 let msg=document.getElementById("message").value;
 let img=document.getElementById("imageInput").files[0];

 let fd=new FormData();
 fd.append("message",msg);
 if(img) fd.append("image",img);

 if(msg) box.innerHTML+=`<div class="message user">👤 ${msg}</div>`;
 if(img) box.innerHTML+=`<div class="message user">📷 CT Uploaded</div>`;

 let thinking=document.createElement("div");
 thinking.className="message bot";
 thinking.innerText="🤖 AI thinking...";
 box.appendChild(thinking);
 box.scrollTop=box.scrollHeight;

 fetch("/chat",{method:"POST",body:fd})
 .then(r=>r.json())
 .then(d=>{
   thinking.remove();
   box.innerHTML+=`<div class="message bot">${d.reply}</div>`;
   box.scrollTop=box.scrollHeight;
 });
}

function downloadReport(){
 window.location="/download_report";
}
</script>

</body>
</html>
